<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2b.network Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    h1 {
      font-size: 2rem;
      letter-spacing: 4px;
      color: #e94560;
      margin-bottom: 8px;
    }
    p.subtitle {
      color: #666;
      font-size: 0.85rem;
      letter-spacing: 2px;
      margin-bottom: 48px;
    }
    .games {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .games h2 {
      font-size: 0.75rem;
      letter-spacing: 3px;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    a.game-link {
      display: block;
      padding: 16px 32px;
      border: 1px solid #333;
      color: #eee;
      text-decoration: none;
      letter-spacing: 2px;
      font-size: 1rem;
      transition: border-color 0.2s, color 0.2s;
    }
    a.game-link:hover {
      border-color: #e94560;
      color: #e94560;
    }
    a.game-link span {
      font-size: 0.75rem;
      color: #555;
      margin-left: 12px;
    }
  </style>
</head>
<body>
  <h1>2b.network</h1>
  <p class="subtitle">PORTAL</p>
  <div class="games">
    <h2>Games</h2>
    <a class="game-link" href="/game1">TETRIS<span>game1</span></a>
  </div>
</body>
</html>
